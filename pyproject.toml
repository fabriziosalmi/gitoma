[build-system]
requires = ["setuptools>=68", "wheel", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "gitoma"
version = "0.1.0"
description = "AI-powered GitHub repository improvement agent — analyzes, plans, commits, and opens PRs autonomously"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "FabGPT", email = "fabgpt.inbox@gmail.com" }]
keywords = ["github", "ai", "agent", "cli", "automation", "bot"]

dependencies = [
    "typer[all]>=0.12",
    "rich>=13.7",
    "GitPython>=3.1",
    "PyGithub>=2.3",
    "openai>=1.30",
    "toml>=0.10",
    "python-dotenv>=1.0",
    "httpx>=0.27",
    "radon>=6.0",
    "fastapi>=0.111.0",
    "uvicorn>=0.30.0",
    "textual>=0.60",
    "mcp[cli]>=1.0",
]

[project.scripts]
gitoma = "gitoma.cli:app"

[project.optional-dependencies]
dev = ["pytest>=8", "ruff>=0.4", "mypy>=1.9"]

[tool.setuptools.packages.find]
where = ["."]
include = ["gitoma*"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.mypy]
python_version = "3.12"
strict = true
